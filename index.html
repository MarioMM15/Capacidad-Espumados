const PART_KEYS = Object.keys(ALL_DATA);

const getStatus = (mean, nom, ts, ti) => {
  const usl = nom + ts, lsl = nom + ti;
  return (mean >= lsl && mean <= usl) ? "ok" : "fail";
};

// Capability indices
const calcCap = (mean, std, nom, ts, ti, isGdt) => {
  if (!std || std === 0) return { pp: null, ppk: null };
  const usl = nom + ts, lsl = nom + ti;
  if (isGdt) {
    // Unilateral (0 to USL)
    const pp = usl / (3 * std);
    const ppk = (usl - mean) / (3 * std);
    return { pp: Math.round(pp * 100) / 100, ppk: Math.round(ppk * 100) / 100 };
  } else {
    const pp = (usl - lsl) / (6 * std);
    const ppk = Math.min((usl - mean), (mean - lsl)) / (3 * std);
    return { pp: Math.round(pp * 100) / 100, ppk: Math.round(ppk * 100) / 100 };
  }
};

const Dot = ({s}) => <span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:s==="ok"?GREEN:RED,marginRight:4,flexShrink:0}}/>;
const PpkBadge = ({v}) => {
  if (v === null || v === undefined || isNaN(v)) return <span style={{color:MUTED,fontSize:9}}>—</span>;
  const c = v >= 1.33 ? GREEN : v >= 1.0 ? AMBER : RED;
  return <span style={{color:c,fontWeight:700,fontSize:11}}>{v.toFixed(2)}</span>;
};

const Card = ({children, style}) => <div style={{background:CARD,borderRadius:12,padding:"18px 22px",border:`1px solid ${BORDER}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",...style}}>{children}</div>;

const Tag = ({label, active, onClick, color}) => (
  <button onClick={onClick} style={{
    padding:"5px 12px",borderRadius:20,border:`1.5px solid ${active?color||TEAL:BORDER}`,cursor:"pointer",
    background:active?(color||TEAL)+"12":"transparent",color:active?color||TEAL:MUTED,
    fontSize:11,fontWeight:600,fontFamily:"inherit",transition:"all 0.15s"
  }}>{label}</button>
);

function Dashboard() {
  const [partIdx, setPartIdx] = useState(0);
  const [view, setView] = useState("overview");
  const [selectedDim, setSelectedDim] = useState(0);
  const [filter, setFilter] = useState("all"); // all | gdt | linear
  const [showOnlyFails, setShowOnlyFails] = useState(false);

  const pn = PART_KEYS[partIdx];
  const part = ALL_DATA[pn];
  const molds = part.molds;

  const filteredDims = useMemo(() => {
    let d = part.dims;
    if (filter === "gdt") d = d.filter(x => x.gdt);
    if (filter === "linear") d = d.filter(x => !x.gdt);
    if (showOnlyFails) d = d.filter(x => x.fails > 0);
    return d;
  }, [partIdx, filter, showOnlyFails]);

  const dim = filteredDims[selectedDim] || filteredDims[0];

  const detailData = useMemo(() => {
    if (!dim) return [];
    return molds.map(m => {
      const v = dim.molds[m];
      if (!v) return null;
      const cap = calcCap(v.mean, v.std, dim.nominal, dim.tol_sup, dim.tol_inf, !!dim.gdt);
      return { mold:"M"+m, mean:v.mean, std:v.std, n:v.n,
        delta: v.mean - dim.nominal,
        status: getStatus(v.mean, dim.nominal, dim.tol_sup, dim.tol_inf),
        pp: cap.pp, ppk: cap.ppk
      };
    }).filter(Boolean);
  }, [partIdx, selectedDim, filter, showOnlyFails]);

  const sorted_dims = useMemo(() =>
    [...filteredDims].sort((a,b) => b.fails - a.fails), [filteredDims]);

  // Capability summary per mold
  const moldCapSummary = useMemo(() => {
    const summary = {};
    molds.forEach(m => {
      let ppkValues = [];
      filteredDims.forEach(d => {
        const v = d.molds[m];
        if (!v || !v.std || v.std === 0) return;
        const cap = calcCap(v.mean, v.std, d.nominal, d.tol_sup, d.tol_inf, !!d.gdt);
        if (cap.ppk !== null && isFinite(cap.ppk)) ppkValues.push(cap.ppk);
      });
      const avg = ppkValues.length ? ppkValues.reduce((a,b)=>a+b,0)/ppkValues.length : null;
      const below1 = ppkValues.filter(v => v < 1.0).length;
      const below133 = ppkValues.filter(v => v < 1.33).length;
      summary[m] = { avgPpk: avg, below1, below133, total: ppkValues.length };
    });
    return summary;
  }, [partIdx, filter, showOnlyFails]);

  const gdtCount = part.dims.filter(d=>d.gdt).length;
  const linCount = part.dims.length - gdtCount;

  return (
    <div style={{background:BG,color:TEXT,fontFamily:"'Inter','Segoe UI',system-ui,sans-serif",minHeight:"100vh",padding:20}}>
      <div style={{maxWidth:1240,margin:"0 auto"}}>
        {/* Part selector */}
        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {PART_KEYS.map((pk,i) => (
            <button key={pk} onClick={() => {setPartIdx(i);setSelectedDim(0);setView("overview");setFilter("all");}} style={{
              padding:"10px 16px",borderRadius:10,border:`1.5px solid ${partIdx===i?TEAL:BORDER}`,cursor:"pointer",
              background:partIdx===i?TEAL:CARD,color:partIdx===i?"#fff":TEXT,
              fontSize:11,fontWeight:700,fontFamily:"inherit",transition:"all 0.2s",textAlign:"left"
            }}><span style={{opacity:0.7,fontSize:9}}>{pk}</span><br/>{ALL_DATA[pk].desc}</button>
          ))}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:10,color:TEAL,letterSpacing:3,fontWeight:700,marginBottom:2}}>{pn}</div>
            <h1 style={{fontSize:20,fontWeight:800,margin:0,color:TEXT}}>{part.desc}</h1>
            <div style={{fontSize:11,color:MUTED,marginTop:3}}>
              {molds.length} moldes · {part.totalDims} cotas ({gdtCount} GD&T + {linCount} lineales)
            </div>
          </div>
          {/* Filters */}
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            <Tag label="Todas" active={filter==="all"} onClick={()=>{setFilter("all");setSelectedDim(0);}}/>
            <Tag label={"GD&T ("+gdtCount+")"} active={filter==="gdt"} onClick={()=>{setFilter("gdt");setSelectedDim(0);}} color="#8B5CF6"/>
            <Tag label={"Lineales ("+linCount+")"} active={filter==="linear"} onClick={()=>{setFilter("linear");setSelectedDim(0);}} color="#0891B2"/>
            <Tag label="Solo fallas" active={showOnlyFails} onClick={()=>{setShowOnlyFails(!showOnlyFails);setSelectedDim(0);}} color={RED}/>
          </div>
        </div>

        {/* View tabs */}
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {[["overview","Resumen"],["detail","Detalle + Capacidad"],["ranking","Moldes"]].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={{
              padding:"8px 18px",borderRadius:8,border:`1.5px solid ${view===k?TEAL:BORDER}`,cursor:"pointer",
              background:view===k?TEAL:CARD,color:view===k?"#fff":MUTED,
              fontSize:11,fontWeight:600,fontFamily:"inherit"
            }}>{l}</button>
          ))}
        </div>

        {/* ═══ OVERVIEW ═══ */}
        {view==="overview" && <React.Fragment>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {molds.map((m,i) => {
              const ms = part.moldStats[m];
              const total = ms.ok+ms.fail;
              const pct = total?Math.round(ms.ok/total*100):0;
              const cap = moldCapSummary[m];
              return (
                <div key={m} style={{
                  background:CARD,borderRadius:10,padding:"14px 16px",textAlign:"center",
                  border:`2px solid ${pct>=80?GREEN:pct>=50?AMBER:RED}30`,minWidth:100,flex:1,
                  boxShadow:"0 1px 3px rgba(0,0,0,0.04)"
                }}>
                  <div style={{fontSize:10,color:MUTED,letterSpacing:1,fontWeight:600}}>MOLDE {m}</div>
                  <div style={{fontSize:28,fontWeight:800,color:pct>=80?GREEN:pct>=50?AMBER:RED}}>{pct}%</div>
                  <div style={{fontSize:9,color:MUTED}}>{ms.ok}✓ {ms.fail}✗ · n={ms.n}</div>
                  {cap && cap.avgPpk !== null && (
                    <div style={{marginTop:6,fontSize:9,color:MUTED}}>
                      Ppk̄: <PpkBadge v={cap.avgPpk}/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:TEAL}}>
                {filter==="gdt"?"COTAS GD&T":filter==="linear"?"COTAS LINEALES":"TODAS LAS COTAS"} ({filteredDims.length})
              </div>
              <div style={{fontSize:10,color:MUTED}}>
                {filter==="gdt"?"Nom=0, unilateral, Ppk=(USL−x̄)/3σ":""}
                {filter==="linear"?"Bilateral, Ppk=min(USL−x̄, x̄−LSL)/3σ":""}
              </div>
            </div>
            <div style={{overflowX:"auto",maxHeight:520,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead style={{position:"sticky",top:0,background:CARD,zIndex:1}}>
                  <tr style={{borderBottom:`2px solid ${BORDER}`}}>
                    <th style={{textAlign:"left",padding:"7px 6px",color:MUTED}}>Dimensión</th>
                    <th style={{textAlign:"left",padding:"7px 4px",color:MUTED}}>Control</th>
                    <th style={{textAlign:"center",padding:"7px 4px",color:MUTED,fontSize:9}}>Tipo</th>
                    <th style={{textAlign:"center",padding:"7px 4px",color:MUTED}}>Fallas</th>
                    {molds.map(m=><th key={m} style={{textAlign:"center",padding:"7px 3px",color:MUTED,fontSize:9}}>M{m}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {sorted_dims.map((d,i) => (
                    <tr key={i} style={{borderBottom:`1px solid ${BORDER}44`,cursor:"pointer",background:i%2===0?"transparent":BG}}
                      onClick={()=>{setSelectedDim(filteredDims.indexOf(d));setView("detail");}}>
                      <td style={{padding:"7px 6px",fontWeight:600,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</td>
                      <td style={{padding:"7px 4px",color:MUTED,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.control}</td>
                      <td style={{textAlign:"center",padding:"4px"}}>
                        <span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:10,
                          background:d.gdt?"#8B5CF620":"#0891B220",color:d.gdt?"#8B5CF6":"#0891B2"
                        }}>{d.gdt?"GD&T":"LIN"}</span>
                      </td>
                      <td style={{textAlign:"center",padding:"7px",color:d.fails>0?RED:GREEN,fontWeight:700}}>{d.fails}/{molds.length}</td>
                      {molds.map(m=>{
                        const v=d.molds[m];
                        if(!v) return <td key={m}/>;
                        const s=getStatus(v.mean,d.nominal,d.tol_sup,d.tol_inf);
                        return <td key={m} style={{textAlign:"center",padding:"3px"}}><Dot s={s}/></td>;
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
        </React.Fragment>}

        {/* ═══ DETAIL ═══ */}
        {view==="detail" && <React.Fragment>
          <Card style={{marginBottom:14}}>
            <select value={selectedDim} onChange={e=>setSelectedDim(Number(e.target.value))}
              style={{background:BG,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 14px",width:"100%",fontSize:12,fontFamily:"inherit"}}>
              {filteredDims.map((d,i)=><option key={i} value={i}>{d.gdt?"[GD&T] ":"[LIN] "}{d.name} — {d.control}</option>)}
            </select>
          </Card>

          {dim && <React.Fragment>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              {[
                ["Tipo", dim.gdt?"GD&T (Unilateral)":"Lineal (Bilateral)"],
                ["Nominal", dim.nominal.toFixed(4)],
                [dim.gdt?"USL":"LSE", (dim.nominal+dim.tol_sup).toFixed(4)],
                [dim.gdt?"LSL (=0)":"LIE", (dim.nominal+dim.tol_inf).toFixed(4)],
                ["Tolerancia", (dim.tol_sup-dim.tol_inf).toFixed(4)]
              ].map(([l,v])=>(
                <div key={l} style={{background:CARD,borderRadius:8,padding:"10px 14px",flex:1,minWidth:100,border:`1px solid ${BORDER}`}}>
                  <div style={{fontSize:9,color:MUTED,letterSpacing:1,fontWeight:600}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:700,marginTop:2,color:l==="Tipo"?(dim.gdt?"#8B5CF6":"#0891B2"):TEXT}}>{v}</div>
                </div>
              ))}
            </div>

            <Card style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:TEAL}}>MEDIA POR MOLDE — {dim.name}</div>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={detailData} margin={{top:20,right:15,bottom:5,left:15}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={BORDER}/>
                  <XAxis dataKey="mold" tick={{fontSize:11,fill:TEXT}}/>
                  <YAxis domain={["auto","auto"]} tick={{fontSize:9,fill:MUTED}} tickFormatter={v=>v.toFixed(3)}/>
                  <Tooltip contentStyle={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:8,fontSize:10,color:TEXT}}
                    formatter={v=>[typeof v==="number"?v.toFixed(5):v]}/>
                  <ReferenceLine y={dim.nominal+dim.tol_sup} stroke={RED} strokeDasharray="5 3" label={{value:"USL",fill:RED,fontSize:9}}/>
                  {!dim.gdt && <ReferenceLine y={dim.nominal+dim.tol_inf} stroke={RED} strokeDasharray="5 3" label={{value:"LSL",fill:RED,fontSize:9}}/>}
                  <ReferenceLine y={dim.nominal} stroke={GREEN} strokeDasharray="3 3" label={{value:"NOM",fill:GREEN,fontSize:9}}/>
                  <Bar dataKey="mean" name="Media" radius={[4,4,0,0]}>
                    {detailData.map((d,i)=><Cell key={i} fill={d.status==="ok"?TEAL:RED}/>)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </Card>

            <Card>
              <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:TEAL}}>
                TABLA DE CAPACIDAD {dim.gdt?"(GD&T — Ppk = (USL − x̄) / 3σ)":"(Bilateral — Ppk = min(USL−x̄, x̄−LSL) / 3σ)"}
              </div>
              <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${BORDER}`}}>
                    {["Molde","Media","Std (σ)","n","Δ vs Nom","Pp","Ppk","Estado"].map(h=>
                      <th key={h} style={{padding:"8px",textAlign:"center",color:MUTED,fontWeight:600}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {detailData.map(d=>(
                    <tr key={d.mold} style={{borderBottom:`1px solid ${BORDER}44`}}>
                      <td style={{padding:8,textAlign:"center",fontWeight:700}}>{d.mold}</td>
                      <td style={{padding:8,textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontSize:10}}>{d.mean.toFixed(5)}</td>
                      <td style={{padding:8,textAlign:"center",color:MUTED,fontFamily:"monospace",fontSize:10}}>{d.std.toFixed(5)}</td>
                      <td style={{padding:8,textAlign:"center",color:MUTED}}>{d.n}</td>
                      <td style={{padding:8,textAlign:"center",color:Math.abs(d.delta)>dim.tol_sup?RED:TEXT,fontFamily:"monospace",fontSize:10}}>
                        {d.delta>=0?"+":""}{d.delta.toFixed(5)}
                      </td>
                      <td style={{padding:8,textAlign:"center"}}><PpkBadge v={d.pp}/></td>
                      <td style={{padding:8,textAlign:"center"}}><PpkBadge v={d.ppk}/></td>
                      <td style={{padding:8,textAlign:"center"}}>
                        <Dot s={d.status}/>
                        <span style={{color:d.status==="ok"?GREEN:RED,fontSize:9,fontWeight:600}}>
                          {d.status==="ok"?"OK":"FALLA"}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              </div>
              <div style={{marginTop:12,fontSize:9,color:MUTED,lineHeight:1.6}}>
                <strong>Criterio Ppk:</strong> ≥1.33 = Capaz (verde) · ≥1.00 = Marginal (ámbar) · &lt;1.00 = No capaz (rojo)<br/>
                {dim.gdt && <React.Fragment><strong>GD&T unilateral:</strong> Pp = USL / 3σ · Ppk = (USL − x̄) / 3σ<br/></React.Fragment>}
                {!dim.gdt && <React.Fragment><strong>Bilateral:</strong> Pp = (USL−LSL) / 6σ · Ppk = min((USL−x̄), (x̄−LSL)) / 3σ<br/></React.Fragment>}
                <strong>Nota:</strong> Con n≤5 estos índices son preliminares. Se recomienda n≥25 para Ppk confiable.
              </div>
            </Card>
          </React.Fragment>}
        </React.Fragment>}

        {/* ═══ RANKING ═══ */}
        {view==="ranking" && <React.Fragment>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:14}}>
            {molds.map((m,i) => {
              const ms = part.moldStats[m];
              const total = ms.ok+ms.fail;
              const pct = total?Math.round(ms.ok/total*100):0;
              const cap = moldCapSummary[m];
              const failedDims = filteredDims.filter(d => {
                const v=d.molds[m];
                return v && getStatus(v.mean,d.nominal,d.tol_sup,d.tol_inf)!=="ok";
              });
              const failGdt = failedDims.filter(d=>d.gdt).length;
              const failLin = failedDims.length - failGdt;
              return (
                <Card key={m}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div>
                      <div style={{fontSize:16,fontWeight:800}}>MOLDE {m}</div>
                      <div style={{fontSize:9,color:MUTED}}>{ms.n} muestras</div>
                    </div>
                    <div style={{fontSize:30,fontWeight:800,color:pct>=80?GREEN:pct>=50?AMBER:RED}}>{pct}%</div>
                  </div>
                  <div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",marginBottom:8}}>
                    <div style={{width:`${ms.ok/total*100}%`,background:GREEN}}/>
                    <div style={{width:`${ms.fail/total*100}%`,background:RED}}/>
                  </div>
                  <div style={{display:"flex",gap:14,fontSize:10,marginBottom:6}}>
                    <span style={{color:GREEN}}>✓ {ms.ok}</span>
                    <span style={{color:RED}}>✗ {ms.fail}</span>
                    {cap && cap.avgPpk !== null && <span style={{color:MUTED}}>Ppk̄: <PpkBadge v={cap.avgPpk}/></span>}
                  </div>
                  {cap && <div style={{fontSize:9,color:MUTED,marginBottom:6}}>
                    Ppk&lt;1.33: {cap.below133} · Ppk&lt;1.00: {cap.below1} de {cap.total}
                  </div>}
                  {failedDims.length>0 && (
                    <div style={{fontSize:9,color:MUTED,maxHeight:90,overflowY:"auto",lineHeight:1.5}}>
                      {failGdt>0 && <React.Fragment><span style={{color:"#8B5CF6",fontWeight:600}}>GD&T ({failGdt}): </span>
                        {failedDims.filter(d=>d.gdt).slice(0,4).map(d=>d.name).join(", ")}
                        {failGdt>4?` +${failGdt-4}`:""}<br/></React.Fragment>}
                      {failLin>0 && <React.Fragment><span style={{color:"#0891B2",fontWeight:600}}>Lineales ({failLin}): </span>
                        {failedDims.filter(d=>!d.gdt).slice(0,4).map(d=>d.name).join(", ")}
                        {failLin>4?` +${failLin-4}`:""}</React.Fragment>}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        </React.Fragment>}
      </div>
    </div>
  );
}


createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
