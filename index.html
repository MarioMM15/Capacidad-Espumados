const PART_KEYS = Object.keys(ALL_DATA);

const getStatus=(m,n,ts,ti)=>(m>=n+ti&&m<=n+ts)?"ok":"fail";
const calcPpk=(mean,std,nom,ts,ti,gdt)=>{
  if(!std||std===0) return null;
  const usl=nom+ts,lsl=nom+ti;
  return gdt?Math.round((usl-mean)/(3*std)*100)/100:Math.round(Math.min(usl-mean,mean-lsl)/(3*std)*100)/100;
};

const diagnose=(mean,std,nom,ts,ti,gdt)=>{
  const usl=nom+ts,lsl=nom+ti;
  const inTol=mean>=lsl&&mean<=usl;
  const ppk=calcPpk(mean,std,nom,ts,ti,gdt);
  const isCap=ppk!==null&&ppk>=1.33;
  if(inTol&&isCap) return "ok";
  const tolR=ts-ti||ts;
  const center=gdt?ts/2:(usl+lsl)/2;
  const offset=gdt?Math.abs(mean-ts/2)/(ts/2||1):Math.abs(mean-center)/((tolR/2)||1);
  const hasShift=!inTol||offset>0.66;
  const hasSpread=std>0&&(ppk===null||ppk<1.33);
  if(hasShift&&hasSpread) return "both";
  if(hasShift) return "shift";
  if(hasSpread) return "spread";
  return "ok";
};

};

const Boxplot=({dim,molds})=>{
  if(!dim) return null;
  const usl=dim.nominal+dim.tol_sup,lsl=dim.nominal+dim.tol_inf;
  const entries=molds.map(m=>{const v=dim.molds[m];return v?{mold:m,...v}:null;}).filter(Boolean);
  if(!entries.length) return null;
  const allVals=entries.flatMap(e=>[e.mn,e.mx,e.m-e.s,e.m+e.s]);
  allVals.push(usl,lsl,dim.nominal);
  const dMin=Math.min(...allVals),dMax=Math.max(...allVals),pad=(dMax-dMin)*0.12||0.01;
  const yMin=dMin-pad,yMax=dMax+pad;
  const W=Math.max(660,entries.length*82),H=300,ml=65,mr=20,mt=25,mb=35,pw=W-ml-mr,ph=H-mt-mb;
  const toY=v=>mt+ph-(v-yMin)/(yMax-yMin)*ph;
  const bw=Math.min(36,pw/entries.length*0.55);
  const range=yMax-yMin,step=Math.pow(10,Math.floor(Math.log10(range)))/2;
  const ticks=[];let t=Math.ceil(yMin/step)*step;while(t<=yMax){ticks.push(t);t+=step;}
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",margin:"0 auto"}}>
    {ticks.map((t,i)=><g key={i}><line x1={ml} x2={W-mr} y1={toY(t)} y2={toY(t)} stroke={BORDER} strokeDasharray="3 3"/><text x={ml-6} y={toY(t)+3} textAnchor="end" fontSize={9} fill={MUTED}>{t.toFixed(3)}</text></g>)}
    <line x1={ml} x2={W-mr} y1={toY(usl)} y2={toY(usl)} stroke={RED} strokeWidth={1.5} strokeDasharray="6 3"/>
    <text x={W-mr+3} y={toY(usl)+3} fontSize={9} fill={RED} fontWeight={700}>USL</text>
    {!dim.gdt&&<React.Fragment><line x1={ml} x2={W-mr} y1={toY(lsl)} y2={toY(lsl)} stroke={RED} strokeWidth={1.5} strokeDasharray="6 3"/><text x={W-mr+3} y={toY(lsl)+3} fontSize={9} fill={RED} fontWeight={700}>LSL</text></React.Fragment>}
    <line x1={ml} x2={W-mr} y1={toY(dim.nominal)} y2={toY(dim.nominal)} stroke={GREEN} strokeWidth={1} strokeDasharray="4 3"/>
    <text x={W-mr+3} y={toY(dim.nominal)+3} fontSize={9} fill={GREEN} fontWeight={600}>NOM</text>
    {entries.map((e,i)=>{const cx=ml+pw/(entries.length)*(i+0.5);const st=getStatus(e.m,dim.nominal,dim.tol_sup,dim.tol_inf);const color=st==="ok"?TEAL:RED;const q1y=toY(e.m-e.s),q3y=toY(e.m+e.s),miny=toY(e.mn),maxy=toY(e.mx),meany=toY(e.m);
    return(<g key={i}><line x1={cx} x2={cx} y1={maxy} y2={miny} stroke={color} strokeWidth={1.5}/><line x1={cx-bw*0.3} x2={cx+bw*0.3} y1={maxy} y2={maxy} stroke={color} strokeWidth={1.5}/><line x1={cx-bw*0.3} x2={cx+bw*0.3} y1={miny} y2={miny} stroke={color} strokeWidth={1.5}/><rect x={cx-bw/2} y={Math.min(q1y,q3y)} width={bw} height={Math.abs(q3y-q1y)||2} fill={color+"22"} stroke={color} strokeWidth={1.5} rx={3}/><line x1={cx-bw/2} x2={cx+bw/2} y1={meany} y2={meany} stroke={color} strokeWidth={2.5}/><circle cx={cx} cy={meany} r={3.5} fill={CARD} stroke={color} strokeWidth={2}/><text x={cx} y={H-mb+14} textAnchor="middle" fontSize={11} fill={TEXT} fontWeight={700}>M{e.mold}</text><text x={cx} y={H-mb+24} textAnchor="middle" fontSize={8} fill={MUTED}>n={e.n}</text></g>);})}
  </svg>);
};

    if(fTipo!=="all") d=d.filter(x=>x.t===fTipo);
    if(fFails) d=d.filter(x=>x.fails>0);
    if(search.trim()){const q=search.toLowerCase();d=d.filter(x=>x.name.toLowerCase().includes(q)||x.control.toLowerCase().includes(q));}
    return d;
  },[partIdx,fTol,fTipo,fFails,search]);

  const dim=filteredDims[selectedDim]||filteredDims[0];

  // Executive analysis per mold per tipo
  const exec=useMemo(()=>{
    const res={};
    molds.forEach(m=>{
      const byTipo={};
      ["DVA","CP","CTQ"].forEach(tipo=>{
        const ds=part.dims.filter(d=>d.t===tipo&&m in d.molds);
        if(!ds.length) return;
        let ok=0,shift=0,spread=0,both=0,passTol=0,capable=0;
        ds.forEach(d=>{
          const v=d.molds[m];
          const inT=getStatus(v.m,d.nominal,d.tol_sup,d.tol_inf)==="ok";
          if(inT) passTol++;
          const ppk=calcPpk(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
          if(ppk!==null&&ppk>=1.33) capable++;
          const dx=diagnose(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
          if(dx==="ok")ok++;else if(dx==="shift")shift++;else if(dx==="spread")spread++;else both++;
        });
        byTipo[tipo]={total:ds.length,pass:passTol,capable,ok,shift,spread,both,
          pctPass:Math.round(passTol/ds.length*100),pctCap:Math.round(capable/ds.length*100)};
      });
      // Overall
      const all=part.dims.filter(d=>m in d.molds);
      let oPass=0,oCap=0,oOk=0,oShift=0,oSpread=0,oBoth=0;
      all.forEach(d=>{
        const v=d.molds[m];
        if(getStatus(v.m,d.nominal,d.tol_sup,d.tol_inf)==="ok")oPass++;
        const ppk=calcPpk(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
        if(ppk!==null&&ppk>=1.33)oCap++;
        const dx=diagnose(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
        if(dx==="ok")oOk++;else if(dx==="shift")oShift++;else if(dx==="spread")oSpread++;else oBoth++;
      });
      res[m]={byTipo,total:all.length,pass:oPass,capable:oCap,pctPass:Math.round(oPass/all.length*100),pctCap:Math.round(oCap/all.length*100),
        diag:{ok:oOk,shift:oShift,spread:oSpread,both:oBoth}};
    });
    return res;
  },[partIdx]);

  // Filtered stats for mold cards
  const moldStats=useMemo(()=>{
    const res={};
    molds.forEach(m=>{
      const ds=filteredDims.filter(d=>m in d.molds);
      let pass=0,cap=0,ok=0,shift=0,spread=0,both=0;
      ds.forEach(d=>{
        const v=d.molds[m];
        if(getStatus(v.m,d.nominal,d.tol_sup,d.tol_inf)==="ok")pass++;
        const ppk=calcPpk(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
        if(ppk!==null&&ppk>=1.33)cap++;
        const dx=diagnose(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);
        if(dx==="ok")ok++;else if(dx==="shift")shift++;else if(dx==="spread")spread++;else both++;
      });
      res[m]={total:ds.length,pass,cap,pctPass:ds.length?Math.round(pass/ds.length*100):0,pctCap:ds.length?Math.round(cap/ds.length*100):0,
        diag:{ok,shift,spread,both}};
    });
    return res;
  },[filteredDims]);

  const detailData=useMemo(()=>{
    if(!dim) return [];
    return molds.map(m=>{const v=dim.molds[m];if(!v) return null;
      const ppk=calcPpk(v.m,v.s,dim.nominal,dim.tol_sup,dim.tol_inf,!!dim.gdt);
      const pp=!v.s?null:dim.gdt?Math.round((dim.nominal+dim.tol_sup)/(3*v.s)*100)/100:Math.round((dim.tol_sup-dim.tol_inf)/(6*v.s)*100)/100;
      return{mold:"M"+m,mean:v.m,std:v.s,n:v.n,mn:v.mn,mx:v.mx,delta:v.m-dim.nominal,status:getStatus(v.m,dim.nominal,dim.tol_sup,dim.tol_inf),pp,ppk};
    }).filter(Boolean);
  },[partIdx,selectedDim,fTol,fTipo,fFails,search]);

  const sorted_dims=useMemo(()=>[...filteredDims].sort((a,b)=>b.fails-a.fails),[filteredDims]);

  const tipoCounts={DVA:part.dims.filter(d=>d.t==="DVA").length,CP:part.dims.filter(d=>d.t==="CP").length,CTQ:part.dims.filter(d=>d.t==="CTQ").length};
  const gdtCount=part.dims.filter(d=>d.gdt).length,linCount=part.dims.length-gdtCount;

  // Find dominant issue for a mold
  const dominant=(diag)=>{
    if(!diag) return{text:"--",color:MUTED};
    const shift=diag.shift||0,spread=diag.spread||0,both=diag.both||0;
    const max=Math.max(shift,spread,both);
    if(max===0) return{text:"Sin problemas",color:GREEN};
    if(both>=shift&&both>=spread) return{text:`Correccion doble (${both})`,color:RED};
    if(shift>spread) return{text:`Media corrida (${shift})`,color:AMBER};
    return{text:`Proceso inestable (${spread})`,color:"#8B5CF6"};
  };

  return(
    <div style={{background:BG,color:TEXT,fontFamily:"'Inter','Segoe UI',system-ui,sans-serif",minHeight:"100vh",padding:20}}>
      <div style={{maxWidth:1280,margin:"0 auto"}}>
        {/* Part selector */}
        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {PART_KEYS.map((pk,i)=>(
            <button key={pk} onClick={()=>{setPartIdx(i);setSelectedDim(0);setView("ejecutivo");setFTol("all");setFTipo("all");setSearch("");}} style={{
              padding:"10px 16px",borderRadius:10,border:`1.5px solid ${partIdx===i?TEAL:BORDER}`,cursor:"pointer",
              background:partIdx===i?TEAL:CARD,color:partIdx===i?"#fff":TEXT,fontSize:11,fontWeight:700,fontFamily:"inherit",textAlign:"left"
            }}><span style={{opacity:0.7,fontSize:9}}>{pk}</span><br/>{ALL_DATA[pk].desc}</button>
          ))}
        </div>

        {/* Header + Filters */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div>
            <div style={{fontSize:10,color:TEAL,letterSpacing:3,fontWeight:700}}>{pn}</div>
            <h1 style={{fontSize:20,fontWeight:800,margin:"2px 0 0"}}>{part.desc}</h1>
            <div style={{fontSize:11,color:MUTED,marginTop:3}}>{molds.length} moldes · {part.totalDims} cotas · DVA:{tipoCounts.DVA} CP:{tipoCounts.CP} CTQ:{tipoCounts.CTQ}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <span style={{fontSize:9,color:MUTED,alignSelf:"center",marginRight:4}}>Tolerancia:</span>
              <Tag label="Todas" active={fTol==="all"} onClick={()=>{setFTol("all");setSelectedDim(0);}}/>
              <Tag label={`GD&T (${gdtCount})`} active={fTol==="gdt"} onClick={()=>{setFTol("gdt");setSelectedDim(0);}} color="#8B5CF6"/>
              <Tag label={`Lineales (${linCount})`} active={fTol==="lin"} onClick={()=>{setFTol("lin");setSelectedDim(0);}} color="#0891B2"/>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <span style={{fontSize:9,color:MUTED,alignSelf:"center",marginRight:4}}>Origen:</span>
              <Tag label="Todos" active={fTipo==="all"} onClick={()=>{setFTipo("all");setSelectedDim(0);}}/>
              <Tag label={`DVA (${tipoCounts.DVA})`} active={fTipo==="DVA"} onClick={()=>{setFTipo("DVA");setSelectedDim(0);}} color="#156082"/>
              <Tag label={`CP (${tipoCounts.CP})`} active={fTipo==="CP"} onClick={()=>{setFTipo("CP");setSelectedDim(0);}} color="#E6A817"/>
              <Tag label={`CTQ (${tipoCounts.CTQ})`} active={fTipo==="CTQ"} onClick={()=>{setFTipo("CTQ");setSelectedDim(0);}} color="#D94040"/>
              <Tag label="Solo fallas" active={fFails} onClick={()=>{setFFails(!fFails);setSelectedDim(0);}} color={RED}/>
            </div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:18}}>
          {[["ejecutivo","Ejecutivo"],["resumen","Resumen"],["detail","Capacidad + Boxplot"],["moldes","Moldes"]].map(([k,l])=>(
            <button key={k} onClick={()=>setView(k)} style={{
              padding:"8px 18px",borderRadius:8,border:`1.5px solid ${view===k?TEAL:BORDER}`,cursor:"pointer",
              background:view===k?TEAL:CARD,color:view===k?"#fff":MUTED,fontSize:11,fontWeight:600,fontFamily:"inherit"
            }}>{l}</button>
          ))}
        </div>

        {/* ═══ EJECUTIVO ═══ */}
        {view==="ejecutivo"&&(()=>{
          const passArr=molds.map(m=>({m,p:moldStats[m]?.pctPass||0,c:moldStats[m]?.pctCap||0})).filter(x=>x.p>0||x.c>0);
          const best=passArr.length?passArr.reduce((a,b)=>a.p>b.p?a:b):null;
          const worst=passArr.length?passArr.reduce((a,b)=>a.p<b.p?a:b):null;
          const univFails=filteredDims.filter(d=>d.fails===molds.length).length;
          return (<React.Fragment>
          {/* KPI strip */}
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <div style={{background:CARD,borderRadius:10,padding:"14px 18px",flex:1,minWidth:130,textAlign:"center",border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:24,fontWeight:800,color:TEAL}}>{filteredDims.length}</div>
              <div style={{fontSize:10,color:MUTED,marginTop:2}}>Cotas evaluadas</div>
            </div>
            <div style={{background:CARD,borderRadius:10,padding:"14px 18px",flex:1,minWidth:130,textAlign:"center",border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:24,fontWeight:800,color:univFails>0?RED:GREEN}}>{univFails}</div>
              <div style={{fontSize:10,color:MUTED,marginTop:2}}>Fallan en TODOS los moldes</div>
            </div>
            {best&&<div style={{background:CARD,borderRadius:10,padding:"14px 18px",flex:1,minWidth:130,textAlign:"center",border:`2px solid ${GREEN}40`}}>
              <div style={{fontSize:9,color:GREEN,fontWeight:700,letterSpacing:1}}>MEJOR MOLDE</div>
              <div style={{fontSize:28,fontWeight:800,color:GREEN}}>M{best.m}</div>
              <div style={{fontSize:10,color:MUTED}}>{best.p}% pasa · {best.c}% capaz</div>
            </div>}
            {worst&&<div style={{background:CARD,borderRadius:10,padding:"14px 18px",flex:1,minWidth:130,textAlign:"center",border:`2px solid ${RED}40`}}>
              <div style={{fontSize:9,color:RED,fontWeight:700,letterSpacing:1}}>PEOR MOLDE</div>
              <div style={{fontSize:28,fontWeight:800,color:RED}}>M{worst.m}</div>
              <div style={{fontSize:10,color:MUTED}}>{worst.p}% pasa · {worst.c}% capaz</div>
            </div>}
          </div>

          {/* Diagnostic per tipo */}
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:TEAL,marginBottom:4}}>DESEMPENO POR TIPO DE COTA</div>
            <div style={{fontSize:9,color:MUTED,marginBottom:10}}>% Pasa = media dentro de tolerancia · % Capaz = Ppk mayor o igual a 1.33 (proceso sostenible)</div>
            <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr style={{borderBottom:`2px solid ${BORDER}`}}>
                {["Tipo","Cotas","% Pasa (rango entre moldes)","% Capaz (rango entre moldes)","Causa raiz dominante"].map(h=>
                  <th key={h} style={{padding:"8px",textAlign:"center",color:MUTED,fontWeight:600}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {["DVA","CP","CTQ"].map(tipo=>{
                  const ds=filteredDims.filter(d=>d.t===tipo);
                  if(!ds.length) return null;
                  const passRng=molds.map(m=>{const md=ds.filter(d=>m in d.molds);const p=md.filter(d=>getStatus(d.molds[m].m,d.nominal,d.tol_sup,d.tol_inf)==="ok").length;return md.length?Math.round(p/md.length*100):0;});
                  const capRng=molds.map(m=>{const md=ds.filter(d=>m in d.molds);const c=md.filter(d=>{const ppk=calcPpk(d.molds[m].m,d.molds[m].s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);return ppk!==null&&ppk>=1.33;}).length;return md.length?Math.round(c/md.length*100):0;});
                  let diag={shift:0,spread:0,both:0};
                  molds.forEach(m=>ds.forEach(d=>{if(!(m in d.molds))return;const v=d.molds[m];const dx=diagnose(v.m,v.s,d.nominal,d.tol_sup,d.tol_inf,!!d.gdt);if(dx==="shift")diag.shift++;if(dx==="spread")diag.spread++;if(dx==="both")diag.both++;}));
                  const dom=dominant(diag);
                  const pMin=Math.min(...passRng),pMax=Math.max(...passRng);
                  const cMin=Math.min(...capRng),cMax=Math.max(...capRng);
                  const tipoColor=tipo==="DVA"?TEAL:tipo==="CP"?AMBER:RED;
                  return (<tr key={tipo} style={{borderBottom:`1px solid ${BORDER}44`}}>
                    <td style={{padding:8,fontWeight:700}}><span style={{color:tipoColor}}>{tipo==="CP"?"Control de Proceso":tipo}</span></td>
                    <td style={{padding:8,textAlign:"center"}}>{ds.length}</td>
                    <td style={{padding:8,textAlign:"center",color:pMin<50?RED:pMin<70?AMBER:GREEN,fontWeight:600}}>{pMin}% - {pMax}%</td>
                    <td style={{padding:8,textAlign:"center",color:cMax<33?RED:cMax<60?AMBER:GREEN,fontWeight:600}}>{cMin}% - {cMax}%</td>
                    <td style={{padding:8,textAlign:"center",color:dom.color,fontWeight:600}}>{dom.text}</td>
                  </tr>);
                })}
              </tbody>
            </table>
            </div>
          </Card>

          {/* Per-mold diagnostic */}
          <Card style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:TEAL,marginBottom:4}}>DIAGNOSTICO POR MOLDE</div>
            <div style={{fontSize:9,color:MUTED,marginBottom:6}}>Cada barra muestra la proporcion de cotas por tipo de problema detectado:</div>
            <div style={{fontSize:9,color:MUTED,marginBottom:12,display:"flex",gap:16,flexWrap:"wrap"}}>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:GREEN,marginRight:4,verticalAlign:"middle"}}/>Sin problema — cumple tolerancia y es capaz</span>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:AMBER,marginRight:4,verticalAlign:"middle"}}/>Media corrida — pieza consistente pero descentrada, requiere ajuste de herramental</span>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#8B5CF6",marginRight:4,verticalAlign:"middle"}}/>Proceso inestable — mucha variacion pieza a pieza, requiere optimizar parametros</span>
              <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:RED,marginRight:4,verticalAlign:"middle"}}/>Correccion doble — media corrida + proceso inestable, requiere herramental + proceso</span>
            </div>
            <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr style={{borderBottom:`2px solid ${BORDER}`}}>
                {["Molde","Cotas","% Pasa tolerancia","% Capaz (Ppk>=1.33)","Diagnostico visual","Problema principal"].map(h=>
                  <th key={h} style={{padding:"8px",textAlign:"center",color:MUTED,fontWeight:600}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {molds.map(m=>{
                  const ms=moldStats[m];if(!ms||!ms.total) return null;
                  const diag=ms.diag||{ok:0,shift:0,spread:0,both:0};
                  const dom=dominant(diag);
                  return(<tr key={m} style={{borderBottom:`1px solid ${BORDER}44`}}>
                    <td style={{padding:8,fontWeight:700,textAlign:"center"}}>M{m}</td>
                    <td style={{padding:8,textAlign:"center",color:MUTED}}>{ms.total}</td>
                    <td style={{padding:8,textAlign:"center",fontWeight:700,color:ms.pctPass>=70?GREEN:ms.pctPass>=50?AMBER:RED}}>{ms.pctPass}%</td>
                    <td style={{padding:8,textAlign:"center",fontWeight:700,color:ms.pctCap>=50?GREEN:ms.pctCap>=30?AMBER:RED}}>{ms.pctCap}%</td>
                    <td style={{padding:"8px 12px",minWidth:200}}><DiagBar ok={diag.ok} shift={diag.shift} spread={diag.spread} both={diag.both} total={ms.total}/></td>
                    <td style={{padding:8,textAlign:"center",color:dom.color,fontWeight:600,fontSize:10}}>{dom.text}</td>
                  </tr>);
                })}
              </tbody>
            </table>
            </div>
          </Card>

          {/* Per-mold per-tipo breakdown */}
          <Card>
            <div style={{fontSize:13,fontWeight:700,color:TEAL,marginBottom:12}}>DETALLE POR MOLDE Y TIPO</div>
            <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:9}}>
              <thead><tr style={{borderBottom:`2px solid ${BORDER}`}}>
                <th style={{padding:6,color:MUTED}}>Molde</th>
                {["DVA","CP","CTQ"].map(t=>
                  <th key={t} colSpan={3} style={{padding:6,textAlign:"center",color:t==="DVA"?TEAL:t==="CP"?AMBER:RED,fontWeight:700,borderLeft:`2px solid ${BORDER}`}}>{t==="CP"?"Control Proceso":t}</th>
                )}
              </tr>
              <tr style={{borderBottom:`1px solid ${BORDER}`}}>
                <th style={{padding:4,color:MUTED}}></th>
                {["DVA","CP","CTQ"].map(t=>
                  ["% Pasa","% Capaz","Dominante"].map((h,i)=>
                    <th key={t+h} style={{padding:4,textAlign:"center",color:MUTED,fontSize:8,borderLeft:i===0?`2px solid ${BORDER}`:"none"}}>{h}</th>
                  )
                )}
              </tr></thead>
              <tbody>
                {molds.map(m=>{
                  const e=exec[m];if(!e) return null;
                  return(<tr key={m} style={{borderBottom:`1px solid ${BORDER}44`}}>
                    <td style={{padding:6,fontWeight:700,textAlign:"center"}}>M{m}</td>
                    {["DVA","CP","CTQ"].map(tipo=>{
                      const t=e.byTipo[tipo];
                      if(!t) return [<td key={tipo+"p"} style={{borderLeft:`2px solid ${BORDER}`,padding:4,textAlign:"center",color:MUTED}}>--</td>,
                        <td key={tipo+"c"} style={{padding:4,textAlign:"center",color:MUTED}}>--</td>,
                        <td key={tipo+"d"} style={{padding:4,textAlign:"center",color:MUTED}}>--</td>];
                      const dom=dominant(t);
                      return [
                        <td key={tipo+"p"} style={{borderLeft:`2px solid ${BORDER}`,padding:4,textAlign:"center",fontWeight:600,color:t.pctPass>=70?GREEN:t.pctPass>=50?AMBER:RED}}>{t.pctPass}%</td>,
                        <td key={tipo+"c"} style={{padding:4,textAlign:"center",fontWeight:600,color:t.pctCap>=50?GREEN:t.pctCap>=30?AMBER:RED}}>{t.pctCap}%</td>,
                        <td key={tipo+"d"} style={{padding:4,textAlign:"center",color:dom.color,fontSize:8,fontWeight:600}}>{dom.text}</td>
                      ];
                    })}
                  </tr>);
                })}
              </tbody>
            </table>
            </div>
          </Card>
        </React.Fragment>);})()}

        {/* ═══ RESUMEN ═══ */}
        {view==="resumen"&&<React.Fragment>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {molds.map(m=>{const ms=moldStats[m];if(!ms||!ms.total)return null;
              const nVal=(part.dims.find(d=>d.molds[m]))?.molds[m]?.n||"?";
              return(<div key={m} style={{background:CARD,borderRadius:10,padding:"14px 16px",textAlign:"center",border:`2px solid ${ms.pctPass>=70?GREEN:ms.pctPass>=50?AMBER:RED}30`,minWidth:100,flex:1}}>
                <div style={{fontSize:10,color:MUTED,letterSpacing:1,fontWeight:600}}>MOLDE {m}</div>
                <div style={{fontSize:28,fontWeight:800,color:ms.pctPass>=70?GREEN:ms.pctPass>=50?AMBER:RED}}>{ms.pctPass}%</div>
                <div style={{fontSize:9,color:MUTED}}>{ms.pass}✓ {ms.total-ms.pass}✗ · n={nVal}</div>
                <div style={{marginTop:5,fontSize:9,color:MUTED}}>Capaces: <span style={{fontWeight:700,color:ms.pctCap>=50?GREEN:ms.pctCap>=30?AMBER:RED}}>{ms.pctCap}%</span></div>
              </div>);
            })}
          </div>
          <Card>
            <div style={{fontSize:13,fontWeight:700,color:TEAL,marginBottom:12}}>{fTipo!=="all"?fTipo:fTol!=="all"?fTol.toUpperCase():"TODAS LAS COTAS"} ({filteredDims.length})</div>
            <div style={{overflowX:"auto",maxHeight:520,overflowY:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead style={{position:"sticky",top:0,background:CARD,zIndex:1}}><tr style={{borderBottom:`2px solid ${BORDER}`}}>
                <th style={{textAlign:"left",padding:"7px 6px",color:MUTED}}>Dimension</th>
                <th style={{textAlign:"left",padding:"7px 4px",color:MUTED}}>Control</th>
                <th style={{textAlign:"center",padding:"7px 4px",color:MUTED,fontSize:9}}>Tipo</th>
                <th style={{textAlign:"center",padding:"7px 4px",color:MUTED,fontSize:9}}>Origen</th>
                <th style={{textAlign:"center",padding:"7px 4px",color:MUTED}}>Fallas</th>
                {molds.map(m=><th key={m} style={{textAlign:"center",padding:"7px 3px",color:MUTED,fontSize:9}}>M{m}</th>)}
              </tr></thead>
              <tbody>
                {sorted_dims.map((d,i)=>(
                  <tr key={i} style={{borderBottom:`1px solid ${BORDER}44`,cursor:"pointer",background:i%2===0?"transparent":BG}}
                    onClick={()=>{setSelectedDim(filteredDims.indexOf(d));setView("detail");}}>
                    <td style={{padding:"7px 6px",fontWeight:600,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</td>
                    <td style={{padding:"7px 4px",color:MUTED,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.control}</td>
                    <td style={{textAlign:"center",padding:"4px"}}><span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:10,background:d.gdt?"#8B5CF620":"#0891B220",color:d.gdt?"#8B5CF6":"#0891B2"}}>{d.gdt?"GD&T":"LIN"}</span></td>
                    <td style={{textAlign:"center",padding:"4px"}}><span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:10,background:d.t==="DVA"?TEAL+"20":d.t==="CP"?AMBER+"20":RED+"20",color:d.t==="DVA"?TEAL:d.t==="CP"?AMBER:RED}}>{d.t}</span></td>
                    <td style={{textAlign:"center",padding:"7px",color:d.fails>0?RED:GREEN,fontWeight:700}}>{d.fails}/{molds.length}</td>
                    {molds.map(m=>{const v=d.molds[m];if(!v) return (<td key={m}/>);return (<td key={m} style={{textAlign:"center",padding:"3px"}}><Dot s={getStatus(v.m,d.nominal,d.tol_sup,d.tol_inf)}/></td>);})}
                  </tr>
                ))}
              </tbody>
            </table></div>
          </Card>
        </React.Fragment>}

        {/* ═══ DETAIL + BOXPLOT ═══ */}
        {view==="detail"&&<React.Fragment>
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <input value={search} onChange={e=>{setSearch(e.target.value);setSelectedDim(0);}} placeholder="Buscar cota... (DVA, DIAGONAL, GROVE, ESPESOR, CTQ...)"
                style={{flex:2,minWidth:200,background:BG,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 14px",fontSize:12,fontFamily:"inherit",outline:"none"}}/>
              <select value={selectedDim} onChange={e=>setSelectedDim(Number(e.target.value))}
                style={{flex:1,minWidth:200,background:BG,color:TEXT,border:`1px solid ${BORDER}`,borderRadius:8,padding:"10px 14px",fontSize:12,fontFamily:"inherit"}}>
                {filteredDims.map((d,i)=><option key={i} value={i}>[{d.t}] {d.gdt?"GD&T":"LIN"} {d.name} — {d.control}</option>)}
              </select>
            </div>
            {search&&<div style={{marginTop:8,fontSize:10,color:MUTED}}>{filteredDims.length} resultados</div>}
          </Card>
          {dim&&<React.Fragment>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              {[["Origen",dim.t],["Tolerancia",dim.gdt?"GD&T (Unil.)":"Lineal (Bil.)"],["Nominal",dim.nominal.toFixed(4)],
                [dim.gdt?"USL":"LSE",(dim.nominal+dim.tol_sup).toFixed(4)],[dim.gdt?"LSL (=0)":"LIE",(dim.nominal+dim.tol_inf).toFixed(4)]
              ].map(([l,v])=>(
                <div key={l} style={{background:CARD,borderRadius:8,padding:"10px 14px",flex:1,minWidth:90,border:`1px solid ${BORDER}`}}>
                  <div style={{fontSize:9,color:MUTED,letterSpacing:1,fontWeight:600}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:700,marginTop:2,color:l==="Origen"?(dim.t==="DVA"?TEAL:dim.t==="CP"?AMBER:RED):TEXT}}>{v}</div>
                </div>
              ))}
            </div>
            <Card style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,color:TEAL}}>BOXPLOT — {dim.name}</div>
                <div style={{fontSize:9,color:MUTED}}>Caja=x +/- 1s · Bigotes=min/max · O=media</div>
              </div>
              <div style={{overflowX:"auto"}}><Boxplot dim={dim} molds={molds}/></div>
            </Card>
            <Card>
              <div style={{fontSize:12,fontWeight:700,marginBottom:10,color:TEAL}}>CAPACIDAD {dim.gdt?"(Ppk=(USL-x)/3s)":"(Ppk=min(USL-x,x-LSL)/3s)"}</div>
              <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead><tr style={{borderBottom:`2px solid ${BORDER}`}}>
                  {["Molde","Media","Std","Min","Max","n","Delta","Pp","Ppk",""].map(h=><th key={h} style={{padding:"8px",textAlign:"center",color:MUTED,fontWeight:600}}>{h}</th>)}
                </tr></thead>
                <tbody>{detailData.map(d=>(
                  <tr key={d.mold} style={{borderBottom:`1px solid ${BORDER}44`}}>
                    <td style={{padding:8,textAlign:"center",fontWeight:700}}>{d.mold}</td>
                    <td style={{padding:8,textAlign:"center",fontFamily:"monospace",fontSize:10}}>{d.mean.toFixed(4)}</td>
                    <td style={{padding:8,textAlign:"center",color:MUTED,fontFamily:"monospace",fontSize:10}}>{d.std.toFixed(4)}</td>
                    <td style={{padding:8,textAlign:"center",color:MUTED,fontFamily:"monospace",fontSize:10}}>{d.mn.toFixed(4)}</td>
                    <td style={{padding:8,textAlign:"center",color:MUTED,fontFamily:"monospace",fontSize:10}}>{d.mx.toFixed(4)}</td>
                    <td style={{padding:8,textAlign:"center",color:MUTED}}>{d.n}</td>
                    <td style={{padding:8,textAlign:"center",fontFamily:"monospace",fontSize:10,color:Math.abs(d.delta)>dim.tol_sup?RED:TEXT}}>{d.delta>=0?"+":""}{d.delta.toFixed(4)}</td>
                    <td style={{padding:8,textAlign:"center"}}><PpkBadge v={d.pp}/></td>
                    <td style={{padding:8,textAlign:"center"}}><PpkBadge v={d.ppk}/></td>
                    <td style={{padding:8,textAlign:"center"}}><Dot s={d.status}/></td>
                  </tr>
                ))}</tbody>
              </table></div>
              <div style={{marginTop:10,fontSize:9,color:MUTED}}>Ppk: >=1.33 Capaz · >=1.00 Marginal · &lt;1.00 No capaz · Nota: n&lt;=8, indices preliminares.</div>
            </Card>
          </React.Fragment>}
        </React.Fragment>}

        {/* ═══ MOLDES ═══ */}
        {view==="moldes"&&<React.Fragment>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14}}>
            {molds.map(m=>{
              const ms=moldStats[m];
              if(!ms||!ms.total) return null;
              const e=exec[m]||{};
              const diag=ms.diag||{ok:0,shift:0,spread:0,both:0};
              const dom=dominant(diag);
              const sampleN=(part.dims.find(d=>d.molds[m]))||{};
              const nVal=sampleN.molds?.[m]?.n||"?";
              return(<Card key={m}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div><div style={{fontSize:16,fontWeight:800}}>MOLDE {m}</div><div style={{fontSize:9,color:MUTED}}>{nVal} muestras</div></div>
                  <div style={{fontSize:30,fontWeight:800,color:ms.pctPass>=70?GREEN:ms.pctPass>=50?AMBER:RED}}>{ms.pctPass}%</div>
                </div>
                <DiagBar ok={diag.ok} shift={diag.shift} spread={diag.spread} both={diag.both} total={ms.total}/>
                <div style={{display:"flex",gap:10,fontSize:9,marginTop:6,marginBottom:6}}>
                  <span style={{color:GREEN}}>Sin problema {diag.ok}</span>
                  <span style={{color:AMBER}}>Media corrida {diag.shift}</span>
                  <span style={{color:"#8B5CF6"}}>Inestable {diag.spread}</span>
                  <span style={{color:RED}}>Corr. doble {diag.both}</span>
                </div>
                <div style={{fontSize:10,marginBottom:6}}>Capaces (Ppk>=1.33): <span style={{fontWeight:700,color:ms.pctCap>=50?GREEN:ms.pctCap>=30?AMBER:RED}}>{ms.pctCap}%</span> · Problema principal: <span style={{color:dom.color,fontWeight:600}}>{dom.text}</span></div>
                {e.byTipo&&<div style={{fontSize:9,color:MUTED,lineHeight:1.5}}>
                  {["DVA","CP","CTQ"].map(tipo=>{
                    const t=(e.byTipo||{})[tipo];
                    if(!t) return null;
                    const td=dominant(t);
                    return(<div key={tipo}><span style={{color:tipo==="DVA"?TEAL:tipo==="CP"?AMBER:RED,fontWeight:600}}>{tipo}:</span> {t.pctPass}% pasa, {t.pctCap}% capaz — <span style={{color:td.color}}>{td.text}</span></div>);
                  })}
                </div>}
              </Card>);
            })}
          </div>
        </React.Fragment>}
      </div>
    </div>
  );
}


createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
